<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="g1" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#ffd1ea"/>
      <stop offset="100%" stop-color="#ff79b4"/>
    </radialGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#s)">
    <ellipse cx="128" cy="128" rx="96" ry="88" fill="url(#g1)"/>
  </g>
  <!-- belly-button face -->
  <circle cx="128" cy="142" r="22" fill="#fff"/>
  <!-- eyes -->
  <circle cx="118" cy="138" r="4" fill="#222"/>
  <circle cx="138" cy="138" r="4" fill="#222"/>
  <!-- mouth (cheeky smirk) -->
  <path d="M118 152 Q128 158 138 152" stroke="#b33" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
