<svg xmlns="http://www.w3.org/2000/svg" width="64" height="72" viewBox="0 0 64 72">
  <defs>
    <linearGradient id="wrap" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff9fc7"/>
      <stop offset="100%" stop-color="#c0306a"/>
    </linearGradient>
    <radialGradient id="frost" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ffc0e0"/>
    </radialGradient>
  </defs>
  <!-- case / wrapper -->
  <path d="M10,42 L16,68 L48,68 L54,42 Z" fill="url(#wrap)"/>
  <!-- case ridges -->
  <line x1="22" y1="42" x2="20" y2="68" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="32" y1="42" x2="32" y2="68" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="42" y1="42" x2="44" y2="68" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- frosting blob -->
  <ellipse cx="32" cy="36" rx="24" ry="20" fill="url(#frost)"/>
  <ellipse cx="32" cy="28" rx="16" ry="14" fill="#fff"/>
  <!-- frosting swirl line -->
  <path d="M24 30 Q28 22 34 28 Q38 32 36 38" stroke="#ffadd2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- cherry on top -->
  <circle cx="32" cy="16" r="7" fill="#d40030"/>
  <path d="M32 9 Q36 4 38 8" stroke="#3a7a10" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- shine on cherry -->
  <circle cx="34" cy="13" r="2" fill="rgba(255,255,255,0.5)"/>
</svg>
