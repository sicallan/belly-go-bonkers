<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- bottom-left block (A) red -->
  <rect x="2"  y="38" width="26" height="24" rx="3" fill="#ff4444"/>
  <rect x="2"  y="38" width="26" height="5"  rx="3" fill="#ff7777"/>
  <text x="15" y="56" font-size="14" font-weight="bold" font-family="Arial" fill="#fff" text-anchor="middle">A</text>
  <!-- bottom-right block (B) blue -->
  <rect x="36" y="38" width="26" height="24" rx="3" fill="#3399ff"/>
  <rect x="36" y="38" width="26" height="5"  rx="3" fill="#77bbff"/>
  <text x="49" y="56" font-size="14" font-weight="bold" font-family="Arial" fill="#fff" text-anchor="middle">B</text>
  <!-- top-centre block (C) yellow -->
  <rect x="18" y="12" width="28" height="24" rx="3" fill="#ffcc00"/>
  <rect x="18" y="12" width="28" height="5"  rx="3" fill="#ffe066"/>
  <text x="32" y="31" font-size="14" font-weight="bold" font-family="Arial" fill="#7a5500" text-anchor="middle">C</text>
  <!-- shadow line between layers -->
  <line x1="4"  y1="40" x2="28" y2="40" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="38" y1="40" x2="60" y2="40" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
</svg>
