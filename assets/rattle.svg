<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 52 52">
  <!-- handle -->
  <rect x="23" y="30" width="7" height="18" rx="3" fill="#ffb347"/>
  <rect x="24" y="30" width="3" height="18" rx="2" fill="#ffd08a" opacity="0.6"/>
  <!-- head -->
  <circle cx="26" cy="22" r="15" fill="#ff5da2"/>
  <circle cx="26" cy="22" r="15" fill="url(#rg)" opacity="0.9"/>
  <defs>
    <radialGradient id="rg" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#ffb6eb"/>
      <stop offset="100%" stop-color="#e0006a"/>
