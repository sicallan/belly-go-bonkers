  <circle cx="34" cy="18" r="2"   fill="#fff" opacity="0.6"/>
  <!-- handle grip marks -->
  <line x1="23" y1="35" x2="30" y2="35" stroke="#e07a00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="39" x2="30" y2="39" stroke="#e07a00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="43" x2="30" y2="43" stroke="#e07a00" stroke-width="1.5" stroke-linecap="round"/>
</svg>
