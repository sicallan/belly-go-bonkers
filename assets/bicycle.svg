<svg xmlns="http://www.w3.org/2000/svg" width="88" height="60" viewBox="0 0 88 60">
  <!-- rear wheel -->
  <circle cx="20" cy="44" r="14" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="20" cy="44" r="4"  fill="#555"/>
  <!-- spokes rear -->
  <line x1="20" y1="30" x2="20" y2="58" stroke="#666" stroke-width="1.5"/>
  <line x1="6"  y1="44" x2="34" y2="44" stroke="#666" stroke-width="1.5"/>
  <line x1="10" y1="34" x2="30" y2="54" stroke="#666" stroke-width="1.5"/>
  <line x1="30" y1="34" x2="10" y2="54" stroke="#666" stroke-width="1.5"/>
  <!-- front wheel -->
  <circle cx="68" cy="44" r="14" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="68" cy="44" r="4"  fill="#555"/>
  <!-- spokes front -->
  <line x1="68" y1="30" x2="68" y2="58" stroke="#666" stroke-width="1.5"/>
  <line x1="54" y1="44" x2="82" y2="44" stroke="#666" stroke-width="1.5"/>
  <line x1="58" y1="34" x2="78" y2="54" stroke="#666" stroke-width="1.5"/>
  <line x1="78" y1="34" x2="58" y2="54" stroke="#666" stroke-width="1.5"/>
  <!-- frame: chain-stay + seat-stay -->
  <polyline points="20,44 34,24 52,24 68,44" fill="none" stroke="#e02020" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- top tube -->
  <line x1="34" y1="24" x2="58" y2="28" stroke="#e02020" stroke-width="4" stroke-linecap="round"/>
  <!-- down tube -->
  <line x1="52" y1="24" x2="58" y2="28" stroke="#cc0000" stroke-width="3.5" stroke-linecap="round"/>
  <!-- seat tube -->
  <line x1="34" y1="24" x2="34" y2="14" stroke="#e02020" stroke-width="3.5" stroke-linecap="round"/>
  <!-- seat -->
  <ellipse cx="34" cy="13" rx="10" ry="4" fill="#222"/>
  <ellipse cx="34" cy="12" rx="9"  ry="3" fill="#555"/>
  <!-- fork & stem -->
  <line x1="58" y1="28" x2="62" y2="14" stroke="#bbb" stroke-width="3.5" stroke-linecap="round"/>
  <!-- handlebars -->
  <line x1="58" y1="14" x2="68" y2="12" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <circle cx="68" cy="12" r="3" fill="#333"/>
  <circle cx="58" cy="14" r="3" fill="#333"/>
  <!-- pedal -->
  <circle cx="44" cy="36" r="5" fill="none" stroke="#888" stroke-width="2.5"/>
  <line x1="40" y1="38" x2="49" y2="33" stroke="#666" stroke-width="2" stroke-linecap="round"/>
</svg>
