<svg xmlns="http://www.w3.org/2000/svg" width="56" height="80" viewBox="0 0 56 80">
  <defs>
    <linearGradient id="cup" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="100%" stop-color="#ff9fd8"/>
    </linearGradient>
  </defs>
  <!-- cup body -->
  <path d="M8,28 L12,76 L44,76 L48,28 Z" fill="url(#cup)"/>
  <!-- cup shine stripe -->
  <path d="M14,28 L17,76" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
  <!-- cup rim -->
  <ellipse cx="28" cy="28" rx="20" ry="5" fill="#ff5da2"/>
  <!-- whipped cream -->
  <ellipse cx="28" cy="22" rx="18" ry="10" fill="#fff"/>
  <ellipse cx="28" cy="16" rx="12" ry="8"  fill="#fff"/>
  <ellipse cx="28" cy="11" rx="7"  ry="6"  fill="#fff"/>
  <!-- cherry -->
  <circle cx="28" cy="5" r="6" fill="#cc0033"/>
  <path d="M28 0 Q32 -4 35 0" stroke="#3a7a10" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="30" cy="3" r="1.5" fill="rgba(255,255,255,0.55)"/>
  <!-- straw -->
  <rect x="36" y="4" width="5" height="36" rx="2" fill="#ffd24d"/>
  <rect x="37" y="4" width="2" height="36" rx="1" fill="rgba(255,255,255,0.4)"/>
</svg>
