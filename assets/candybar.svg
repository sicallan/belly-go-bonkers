<svg xmlns="http://www.w3.org/2000/svg" width="72" height="40" viewBox="0 0 72 40">
  <defs>
    <linearGradient id="wrap" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7b3fa0"/>
      <stop offset="100%" stop-color="#4a1060"/>
    </linearGradient>
    <linearGradient id="choc" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#6b3820"/>
      <stop offset="100%" stop-color="#3d1a08"/>
    </linearGradient>
  </defs>
  <!-- wrapper -->
  <rect x="2" y="2" width="68" height="36" rx="6" fill="url(#wrap)"/>
  <!-- label text stripe -->
  <rect x="2" y="14" width="68" height="12" rx="0" fill="rgba(255,255,255,0.12)"/>
  <text x="36" y="24" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="10" font-weight="900" fill="#ffd966" letter-spacing="2">BONK!</text>
  <!-- chocolate segments peeking out bottom -->
  <rect x="8"  y="30" width="12" height="6" rx="2" fill="url(#choc)"/>
  <rect x="22" y="30" width="12" height="6" rx="2" fill="url(#choc)"/>
  <rect x="36" y="30" width="12" height="6" rx="2" fill="url(#choc)"/>
  <rect x="50" y="30" width="12" height="6" rx="2" fill="url(#choc)"/>
  <!-- shine -->
  <ellipse cx="20" cy="8" rx="10" ry="3" fill="rgba(255,255,255,0.18)" transform="rotate(-5,20,8)"/>
</svg>
